services:
  mongo:
    image: mongo:7
    container_name: resume_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend1
      dockerfile: Dockerfile
    container_name: resume_backend
    restart: unless-stopped
    env_file:
      - ./backend1/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/
    ports:
      - "8000:8000"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: resume_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
